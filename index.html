<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Support Us | Jesus Youth KMC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    body {
      font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #FF8C42 0%, #FF6B35 50%, #F25E2C 100%);
      padding: 20px;
    }
    
    .bg-logo {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      object-fit: contain;
      bottom: 20px;
      right: -100px;
      width: 70%;
      max-width: 800px;
      opacity: 0.15;
    }
    @media (min-width: 768px) { .bg-logo { right: -150px; width: 50%; } }
    @media (min-width: 1024px) { .bg-logo { right: -200px; width: 40%; opacity: 0.1; } }
    
    .content-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 768px;
    }
    
    .prayer-btn {
      background: white;
      color: #FF6B35;
      font-weight: 600;
      padding: 16px 32px;
      border-radius: 50px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.3s ease;
      cursor: pointer;
      border: none;
      font-size: 1.125rem;
      min-width: 220px;
      position: relative;
      overflow: hidden;
    }
    .prayer-btn:hover { transform: scale(1.02); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2); }
    .prayer-btn:disabled { cursor: wait; }
    
    .loading-bar-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #fde68a, #FF8C42, #FF6B35);
      border-radius: 50px;
      z-index: 0;
      transition: width 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      pointer-events: none;
    }
    .prayer-btn.loading .loading-bar-fill { width: 100% !important; transition: width 2s linear; }
    .prayer-btn.loading .btn-text { opacity: 0; transition: opacity 0.15s ease; }
    .prayer-btn.loading { cursor: wait; }
    
    @keyframes loadingGlow {
      0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.3); }
      50% { box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.5); }
      100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.3); }
    }
    .prayer-btn.loading { animation: loadingGlow 1s infinite; }
    
    .counter-wrapper {
      display: inline-block;
      background: linear-gradient(135deg, #fde68a, #FF8C42);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      font-weight: bold;
    }
    
    @keyframes counterGlow {
      0% { text-shadow: 0 0 0px rgba(255, 255, 255, 0); transform: scale(1); }
      50% { text-shadow: 0 0 20px rgba(255, 255, 255, 0.8); transform: scale(1.05); }
      100% { text-shadow: 0 0 0px rgba(255, 255, 255, 0); transform: scale(1); }
    }
    .counter-glow {
      animation: counterGlow 0.5s ease-out;
    }
    
    .fade-up {
      opacity: 0;
      transform: translateY(25px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  
  <img src="logo.png" alt="Jesus Youth KMC" class="bg-logo">

  <div class="content-wrapper">
    <section id="support" class="py-20 md:py-28">
      <div class="max-w-3xl mx-auto px-5 md:px-8">
        <div class="bg-white/10 backdrop-blur-md rounded-3xl p-8 md:p-12 shadow-lg fade-up visible border border-white/30 text-center">
          <div class="text-5xl mb-4">💝</div>
          <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">Support Us</h2>
          <p class="text-amber-100 text-lg mb-8">Your prayers are the foundation of our ministry. Every Hail Mary lifts us up!</p>
          
          <div class="bg-white/5 rounded-2xl p-8 mb-8">
            <div class="text-6xl font-bold mb-2">
              <span id="prayerCountDisplay" class="counter-wrapper">0</span>
            </div>
            <p class="text-white/80 text-lg">Hail Mary's received from all supporters</p>
          </div>
          
          <div class="prayer-button-container">
            <button id="prayerButton" class="prayer-btn">
              <div id="loadingBarFill" class="loading-bar-fill"></div>
              <span class="btn-text">🙏 Pray a Hail Mary</span>
            </button>
          </div>
          
          <p class="text-white/60 text-sm mt-6">"The fervent prayer of a righteous person is very powerful." — James 5:16</p>
        </div>
      </div>
    </section>
  </div>

  <audio id="prayerSound" preload="auto" style="display: none;"></audio>

  <script>
    // ============ PRAYER COUNTER ============
    const API = 'https://script.google.com/macros/s/AKfycbwNdwXUGx00p_KbCIZ54-q--bjdphMtluDq6k9_3ym-XlQhPF0EN7K0uj-y20JvP9rggg/exec';
    const display = document.getElementById('prayerCountDisplay');
    const btn = document.getElementById('prayerButton');
    const fill = document.getElementById('loadingBarFill');
    const audio = document.getElementById('prayerSound');
    
    if (audio) {
      audio.volume = 0.7;
      audio.preload = 'auto';
      audio.src = 'prayer-sound.mp3';
      audio.load();
    }

    let processing = false;
    let audioUnlocked = false;

    function updateDisplayDirect(val) {
      if (display) {
        display.classList.remove('counter-glow');
        void display.offsetWidth;
        display.innerHTML = `<span class="counter-wrapper">${val.toLocaleString()}</span>`;
        display.classList.add('counter-glow');
        setTimeout(() => {
          display.classList.remove('counter-glow');
        }, 500);
      }
    }

    async function fetchCount() {
      try {
        let res = await fetch(API);
        let data = await res.json();
        updateDisplayDirect(data.count);
      } catch (e) {
        if (display) display.innerHTML = '<span class="counter-wrapper">—</span>';
      }
    }

    async function increment() {
      if (processing) return;
      
      processing = true;
      btn.classList.add('loading');
      btn.disabled = true;
      fill.style.width = '100%';
      let originalText = btn.querySelector('.btn-text').innerHTML;
      
      if (audio && !audioUnlocked) {
        audio.src = 'silent.mp3';
        await audio.play().catch(() => {});
        audio.pause();
        audioUnlocked = true;
        audio.src = 'prayer-sound.mp3';
        audio.load();
      }
      
      try {
        await fetch(API, { method: 'POST' });
        await new Promise(r => setTimeout(r, 300));
        let res = await fetch(API);
        let data = await res.json();
        
        btn.classList.remove('loading');
        btn.disabled = false;
        fill.style.width = '0%';
        updateDisplayDirect(data.count);
        
        if (audio) {
          audio.currentTime = 0;
          audio.play().catch(() => {});
        }
        
        let span = btn.querySelector('.btn-text');
        span.innerHTML = 'Thank You ☺️';
        btn.style.backgroundColor = '#4CAF50';
        btn.style.color = 'white';
        setTimeout(() => {
          span.innerHTML = originalText;
          btn.style.backgroundColor = '';
          btn.style.color = '';
        }, 2000);
      } catch (e) {
        btn.classList.remove('loading');
        btn.disabled = false;
        fill.style.width = '0%';
        alert('Unable to save your prayer. Please try again later.');
      } finally {
        processing = false;
      }
    }

    fetchCount();
    if (btn) btn.addEventListener('click', increment);
  </script>
</body>
</html>
